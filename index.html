<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fullscreen Gallery</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
    }

    section {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 40px 60px;
      box-sizing: border-box;
      gap: 40px;
    }

    .box {
      flex: 1;
      max-width: 50%;
    }

    .text {
      color: white;
      font-size: 2rem;
      background: rgba(0,0,0,0.4);
      padding: 20px;
    }

    iframe {
      width: 100%;
      max-width: 800px;
      height: 150px;
      border: none;
      display: block;
    }

    .reverse {
      flex-direction: row-reverse;
    }
  </style>
</head>
<body>

  <!-- 1η εικόνα -->
  <section>
    <img src="papas-gatito.gif" alt="Image 1">

    <div class="overlay">
      <div class="box text">
        Κείμενο για την πρώτη εικόνα
      </div>

      <div class="box">
        <iframe 
          src="https://www.youtube.com/embed/videoseries?list=PLPEJTSKudQZDULLhDyenXwqnjUEoLOq56&controls=0&rel=0&modestbranding=1"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </section>

  <!-- 2η εικόνα -->
  <section>
    <img src="images.jfif" alt="Image 2">

    <div class="overlay reverse">
      <div class="box text">
        Κείμενο για τη δεύτερη εικόνα
      </div>

      <div class="box">
        <iframe 
          src="https://www.youtube.com/watch?v=2tOutF8B3f8&list=PLfFIyLKPD1HAyMfoOr8dX0jbHY33hTG_q"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </section>

</body>
</html>
